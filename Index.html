<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Darlane ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a0b1c 0%, #0d0514 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #introScreen {
            position: absolute;
            z-index: 50;
            width: 100%;
            height: 100%;
            background: #0d0514;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease-in-out;
        }

        .heart-beat {
            font-size: 3rem;
            animation: beat 1s infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes beat {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(255, 107, 129, 0.5); }
            100% { transform: scale(1.2); text-shadow: 0 0 30px rgba(255, 107, 129, 0.8); }
        }

        .intro-text {
            color: #ffb8c6;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInOut 2s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        #mainContainer {
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 2s ease, transform 2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 550px;
            pointer-events: none;
        }

        #mainContainer.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 184, 198, 0.05);
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ffd1d9, #ff6b81, #ffd1d9);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        h2 {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 1.5px;
        }

        #typewriterText {
            font-size: 1.3rem;
            min-height: 90px;
            line-height: 1.6;
            color: #f8ecee;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #ff6b81;
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn {
            background: rgba(255, 107, 129, 0.1);
            color: #ffb8c6;
            border: 1px solid rgba(255, 107, 129, 0.4);
            padding: 12px 35px;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            outline: none;
            backdrop-filter: blur(5px);
        }

        .btn.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .btn:hover {
            background: #ff6b81;
            color: #fff;
            border-color: #ff6b81;
            box-shadow: 0 0 20px rgba(255, 107, 129, 0.4);
            transform: translateY(-2px);
        }

        #endScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
            z-index: 100;
        }

        #endScreen.visible {
            opacity: 1;
        }

        #endScreen h1 {
            font-size: 3.5rem;
            color: #ff6b81;
            text-shadow: 0 0 30px rgba(255, 107, 129, 0.4);
            -webkit-text-fill-color: #ff6b81;
            font-family: 'Playfair Display', serif;
        }

    </style>
</head>
<body>    
    <canvas id="emojiCanvas"></canvas>

    <div id="introScreen">
        <div class="heart-beat">❤️</div>
        <p class="intro-text">Just a moment...</p>
    </div>

    <div id="mainContainer">
        <div class="glass-card" id="glassCard">
            <h1>Hey Darlane ❤️</h1>
            <h2>Just a little surprise for you.</h2>
            <div id="typewriterText"><span class="text-content"></span><span class="cursor"></span></div>
            <button id="nextBtn" class="btn">Next &rarr;</button>
        </div>
    </div>

    <div id="endScreen">
        <h1>You smiled. ❤️</h1>
        <p style="font-size: 1.2rem; color: rgba(255,255,255,0.7); margin-top: 15px; font-weight: 300;">Mission Complete.</p>
    </div>

    <script>
        const storyMessages = [
            "Hey... 👀",
            "Ek second... itni jaldi Next mat dabana. 🤏",
            "Pehle ek baat batao... 🤔",
            "Tum itni ziddi kyun ho? 😂",
            "Jab maine date ke liye pucha... ☕",
            "Seedha NO. 😑",
            "Phir ek aur NO. 🙄",
            "Phir thode aur nakhre. 🤦‍♂️",
            "Aur finally... ✨",
            "\"পরে ভেবে বলবো.\" 🥴",
            "Tumhare liye bas ek sentence tha... 💭",
            "Mere liye pura din better ho gaya. ❤️",
            "Tab socha... 💡",
            "Normal message? ❌",
            "Meme? ❌",
            "Reel? ❌",
            "Website? ...Okay, that's different. 😌",
            "Waise tum soch rahi hogi... 🤨",
            "\"Iske paas itna free time hai?\" 😂",
            "Answer: Haan... tumhare liye tha. 💙",
            "Relax... 🌸",
            "Yeh website tumhe force karne ke liye nahi hai. 🤝",
            "Na hi impress karne ke liye. 😊",
            "Bas ek smile churane ke liye. 😄",
            "Aur agar tum smile kar rahi ho... 👀",
            "Toh mission already successful. ✅❤️",
            "Waise ek secret bolun? 🤫",
            "Tum haste hue aur bhi cute lagti ho. 🫶",
            "Haan haan... blush mat karna. 🤭",
            "Ek challenge hai. 😏",
            "Date pe jo pehle has dega... ☕😂",
            "Uski treat. 🤝",
            "Par honestly... 💭",
            "Main shayad pehle hi haar jaunga. 😂",
            "Kyunki tumhari smile dangerous hai. 💘",
            "Bas ek request... 🙃",
            "Jab hum milenge na... bas waise hi hasna, jaise chats mein hasti ho. 🌼",
            "Bas ab... 💫",
            "Baaki decision tumhara. 🌸",
            "Hopefully... see you soon, Darlane. 🌹"
        ];

        let currentMessageIndex = 0;
        let isTyping = false;

        const textContentElement = document.querySelector('.text-content');
        const nextBtn = document.getElementById('nextBtn');
        const mainContainer = document.getElementById('mainContainer');
        const endScreen = document.getElementById('endScreen');
        const introScreen = document.getElementById('introScreen');

        const canvas = document.getElementById('emojiCanvas');
        const ctx = canvas.getContext('2d');
        let emojisArray = [];
        const emojiList = ['❤️', '💖', '🌸', '✨', '💕', '🤍'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class FloatingEmoji {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height; 
                this.emoji = emojiList[Math.floor(Math.random() * emojiList.length)];
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 1 + 0.5;
                this.sway = Math.random() * Math.PI * 2;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y += this.speed;
                this.sway += this.swaySpeed;
                this.x += Math.sin(this.sway) * 0.5;

                if (this.y > canvas.height + 50) {
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        for (let i = 0; i < 40; i++) {
            emojisArray.push(new FloatingEmoji());
        }

        function animateEmojis() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            emojisArray.forEach(emoji => {
                emoji.update();
                emoji.draw();
            });
            requestAnimationFrame(animateEmojis);
        }

        function playIntro() {
            // Simple, safe timeout to remove loading screen
            setTimeout(() => {
                introScreen.style.opacity = 0;
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    mainContainer.classList.add('visible');
                    typeMessage(storyMessages[currentMessageIndex]);
                }, 2000);
            }, 3000);
        }

        function typeMessage(message) {
            isTyping = true;
            nextBtn.classList.remove('visible');
            textContentElement.textContent = '';
            
            let i = 0;
            function typeChar() {
                if (i < message.length) {
                    textContentElement.textContent += message.charAt(i);
                    i++;
                    // Smooth, random typing speed
                    let speed = Math.random() * 40 + 30;
                    setTimeout(typeChar, speed);
                } else {
                    isTyping = false;
                    nextBtn.classList.add('visible');
                }
            }
            typeChar();
        }

        nextBtn.addEventListener('click', () => {
            if (isTyping) return;
            
            currentMessageIndex++;
            if (currentMessageIndex < storyMessages.length) {
                typeMessage(storyMessages[currentMessageIndex]);
            } else {
                // End of story, show final screen
                mainContainer.classList.remove('visible');
                setTimeout(() => {
                    endScreen.classList.add('visible');
                    // Add more emojis for celebration
                    for(let i=0; i<30; i++) emojisArray.push(new FloatingEmoji());
                    
                    setTimeout(() => {
                        location.reload();
                    }, 10000);
                }, 2000);
            }
        });

        // Initialize completely safe functions on load
        window.onload = () => {
            animateEmojis();
            playIntro();
        };
    </script>
</body>
</html>
